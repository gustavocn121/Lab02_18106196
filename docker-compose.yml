services:
  postgres:
    image: postgres:13
    container_name: lab01_postgres
    environment:
      POSTGRES_DB: lab_01_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./sql/ddl.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab01_network

  ingestao:
    build: .
    container_name: lab01_ingestao
    depends_on:
      - postgres
    networks:
      - lab01_network
    volumes:
      - ./data:/app/data

  metabase:
    image: metabase/metabase:latest
    container_name: lab01_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      MB_ENABLE_SERIALIZATION: true
    depends_on:
      - postgres
    networks:
      - lab01_network
    volumes:
      - ./metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:

networks:
  lab01_network:
